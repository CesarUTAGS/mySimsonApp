<ion-header [translucent]="true">
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Acerca de</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="ion-text-center ion-margin-bottom">
    <ion-icon name="information-circle-outline" style="font-size: 64px;" color="warning"></ion-icon>
  </div>

  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ proyectoInfo.nombre }}</ion-card-title>
      <ion-card-subtitle>Versión {{ proyectoInfo.version }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>{{ proyectoInfo.descripcion }}</p>
      <ion-list lines="none" class="ion-margin-top">
        <ion-item>
          <ion-label>
            <strong>Desarrollado por:</strong>
            <p>{{ proyectoInfo.desarrollador }}</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
